    # - UwV83HsGsw3_1 # 7
    # - Vt2qJdWjCF2_1 # 8
    # - YmJkqBEsHnH_1 # 9

mesh_max_res: 0.01 # in meters
sem_gt_from_mesh: True

camera:
    w: 540
    h: 540
    hfov: 90 # for visualization


simulation:
    download_poses: True   # don't download if exists

    rgb: true
    depth: true
    semantic: true
    step: 3

    resolution:
        w: 540
        h: 540 #720, currently it is always square in simulation
    camera_height: 1.5

    base2cam_rot: [1, 0, 0, 0, -1, 0, 0, 0, -1]
    base_forward_axis: [0, 0, -1]
    base_left_axis: [-1, 0, 0]
    base_up_axis: [0, 1, 0]
    # cam_calib_mat: [540, 0, 540, 0, 540, 360, 0, 0, 1]  # or get_sim_cam_mat_with_fov from vlmaps.utils.mapping_utils
    hfov: 90 # back_rgb_sensor_spec.hfov -> Deg(90)

    ignore_indx: -1000

