[environments]
legacy = ["py27"]
habitat = ["habitat"]
xdecoder = ['xdecoder']



# ######### Matterport3D tasks ###########
[tasks.unzip_mp3d]
cmd = """
bash -lc '
unzip v1/tasks/mp3d_habitat.zip  \
mp3d/5LpN3gDmAk7/* \
mp3d/gTV8FGcVJC9/* \
mp3d/jh4fc5c5qoQ/* \
mp3d/JmbYfDe2QKZ/* \
mp3d/mJXqzFtmKg4/* \
mp3d/ur6pFq6Qu1A/* \
mp3d/UwV83HsGsw3/* \
mp3d/Vt2qJdWjCF2/* \
mp3d/YmJkqBEsHnH/*
' \
&& mv mp3d/ ~/data/ && rm -rf v1
"""
default-environment = "legacy"

[tasks.download_mp3d_config]
cmd = """
wget https://dl.fbaipublicfiles.com/habitat/mp3d/config_v1/mp3d.scene_dataset_config.json \
&&  mv mp3d.scene_dataset_config.json ~/data/mp3d/
"""
default-environment = "legacy"
# depends-on = [{ task = "unpack_mp3d"}]

[tasks.simulation_mp3d]
cmd = """python data_scripts/matterport/simulation.py"""
default-environment = "habitat"
env = { PYTHONPATH = "src" }
depends-on = [{ task = "download_mp3d_config"}]

[tasks.download_open_scene]
cmd = """
wget https://cvg-data.inf.ethz.ch/openscene/models/matterport_lseg.pth.tar \
&& mkdir -p ~/data/models \
&& mv matterport_lseg.pth.tar ~/data/models
"""


# ######### SemanticKITTI tasks ###########
[tasks.unzip_sem_kitti]
cmd = """
mkdir -p ~/data/semantic_kitti \
&& unzip ~/data/data_odometry_color.zip -d ~/data/semantic_kitti
"""
[tasks.download_xdecoder]
cmd = """
wget https://huggingface.co/xdecoder/X-Decoder/resolve/main/xdecoder_focall_last.pt \
&& mkdir -p ~/data/models \
&& mv xdecoder_focall_last.pt ~/data/models
"""

[tasks.install_xdecoder]
cmd = '''
python -m pip install --no-build-isolation "git+https://github.com/MaureenZOU/detectron2-xyz.git"'''
default-environment = "xdecoder"

[tasks.extract_language_features_sem_kitti]
cmd = """PYTHONPATH=.:third_party/X-Decoder python3 data_scripts/semantic_kitti/extract_lang_features.py"""
default-environment = "xdecoder"

