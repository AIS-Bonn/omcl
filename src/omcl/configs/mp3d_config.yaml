defaults:
  - dataset: vlmaps
  - paths: ${dataset}
  - optional simulate: ${dataset}
  - scene: ${dataset}
  - visual_model: lseg  #open_scene
  - _self_

num_particles: 1024  # 256 1024
std_t: 0.1
std_rot: 0.1
num_samples: 1024  # 4096 1024
in_3D: False

particles_batch_size: 128 # 32, 256
rays_loss_batch_size: 16  # 10
sampling: 'default'


init_std_x: 0.3
init_std_y: 0.3

global_localization:
  active: False
  distances: [2., 1., 0.5, 0.2, 0.1]

vis:
  demo: False
  floor: False
  plot_gt: True
  plot_estimated: True
  plot_particles: True
  particles_stride: 32
  num_colors: 200