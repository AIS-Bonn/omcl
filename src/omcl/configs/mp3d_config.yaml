defaults:
    - dataset: vlmaps
    - visual_model: lseg  #open_scene
    - _self_

paths:
    all_data: 'data'

semantic_grounding: False

num_particles: 1024
num_samples: 1024

particles_batch_size: 128
rays_loss_batch_size: 16
sampling: 'default'


init_std_x: 0.3
init_std_y: 0.3
init_std_th: 0.1

odom:
    rot_x_std: 0.0
    rot_y_std: 0.1
    rot_z_std: 0.0
    x_std: 0.1
    y_std: 0.0
    z_std: 0.1

global_localization:
    distances: [2., 1., 0.5, 0.2, 0.1]

vis:
    demo: False
    floor: False
    plot_gt: True
    plot_data: True
    plot_rays: True
    plot_particles: True
    particles_stride: 32
    map_stride: 2
    num_colors: 500
    odom_stride: -1
    axes_length: 0.25
    axes_radius: 0.02
    frustum_scale: 0.25